<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Portfolio Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">SG</div>
        <div>
          <div class="brand-title">Portfolio Admin</div>
        </div>
      </div>
      <nav class="nav flex-column gap-2 mt-4">
        <a class="nav-link active" href="#overview">Overview</a>
        <a class="nav-link" href="#events">Live Events</a>
        <a class="nav-link" href="#leads">Leads</a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar glass">
        <h1 class="h4 mb-0">Dashboard</h1>
        <div class="d-flex gap-2">
          <input id="adminToken" class="form-control form-control-sm bg-dark text-light border-secondary" type="password" placeholder="Token">
          <button class="btn btn-primary btn-sm" onclick="saveToken()">Authenticate</button>
          <button class="btn btn-outline-light btn-sm" onclick="loadStats()">Sync</button>
          <button class="btn btn-outline-warning btn-sm" onclick="downloadCSV()">CSV</button>
        </div>
      </header>

      <section id="overview" class="section-grid mt-4">
        <div class="stat-card glass"><div class="label">Total Events</div><div id="totalEvents" class="value">0</div></div>
        <div class="stat-card glass"><div class="label">Unique Visitors</div><div id="uniqueVisitors" class="value">0</div></div>
        <div class="stat-card glass"><div class="label">Sessions</div><div id="sessions" class="value">0</div></div>
        <div class="stat-card glass"><div class="label">Leads</div><div id="totalLeads" class="value">0</div></div>
        <div class="stat-card glass"><div class="label">Downloads</div><div id="totalDownloads" class="value">0</div></div>
        <div class="stat-card glass"><div class="label">Degree Clicks</div><div id="totalDegreeClicks" class="value">0</div></div>
      </section>

      <section class="charts-grid mt-4">
        <div class="panel glass"><div class="panel-head">Timeline</div><div id="chartDay" class="chart-box"></div></div>
        <div class="panel glass"><div class="panel-head">Types</div><div id="chartType" class="chart-box"></div></div>
      </section>

      <section id="events" class="panel glass mt-4">
        <div class="panel-head d-flex justify-content-between">
          <span>Telemetry Stream</span>
          <div class="d-flex gap-2">
            <input id="searchBox" class="form-control form-control-sm bg-dark text-light border-secondary" placeholder="Search...">
            <select id="typeFilter" class="form-select form-select-sm bg-dark text-light border-secondary">
              <option value="">All</option><option value="visit">Visit</option><option value="lead">Lead</option>
            </select>
          </div>
        </div>
        <table class="table table-dark mb-0">
          <thead><tr><th>Time</th><th>Category</th><th>Path</th><th>Device</th><th>Geo</th><th>Meta</th></tr></thead>
          <tbody id="eventRows"></tbody>
        </table>
      </section>
      <div id="toastHost" class="toast-host"></div>
    </main>
  </div>
  <script src="dashboard.js"></script>
</body>
</html>
